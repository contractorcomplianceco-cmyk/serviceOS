components:
  schemas:
    Quote:
      type: object
      required: [id, tenantId, customerId, number, lines, amount, status, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        customerId: { type: string }
        locationId: { type: ["string", "null"] }
        workOrderId: { type: ["string", "null"] }
        number: { type: string }
        title: { type: string }
        lines:
          type: array
          items:
            $ref: "#/components/schemas/QuoteLine"
        amount: { type: number }
        status: { type: string }
        notes: { type: ["string", "null"] }
        validUntil: { type: ["string", "null"], format: date }
        decidedAt: { type: ["string", "null"], format: date-time }
        decidedByName: { type: ["string", "null"] }
        decisionNote: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    QuoteLine:
      type: object
      required: [id, description, quantity, rate]
      properties:
        id: { type: string }
        description: { type: string }
        quantity: { type: number }
        rate: { type: number }

    QuoteLineInput:
      type: object
      required: [description, quantity, rate]
      properties:
        description: { type: string, minLength: 1 }
        quantity: { type: number }
        rate: { type: number }

    QuoteInput:
      type: object
      required: [customerId, lines]
      properties:
        customerId: { type: string, minLength: 1 }
        locationId: { type: string }
        workOrderId: { type: string }
        title: { type: string }
        notes: { type: string }
        validUntil: { type: string, format: date }
        status:
          type: string
          enum: [Draft, Sent]
        lines:
          type: array
          items:
            $ref: "#/components/schemas/QuoteLineInput"

    QuoteDecisionInput:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [Approved, Rejected]
        note: { type: string }

    InvoiceLine:
      type: object
      required: [id, description, quantity, rate]
      properties:
        id: { type: string }
        description: { type: string }
        quantity: { type: number }
        rate: { type: number }

    Invoice:
      type: object
      required: [id, tenantId, customerId, number, lines, amount, amountPaid, status, dueDate, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        customerId: { type: string }
        workOrderId: { type: ["string", "null"] }
        number: { type: string }
        lines:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLine"
        amount: { type: number }
        amountPaid: { type: number }
        status: { type: string }
        issueDate: { type: ["string", "null"], format: date }
        dueDate: { type: string, format: date }
        paidDate: { type: ["string", "null"], format: date }
        notes: { type: ["string", "null"] }
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    InvoiceCreateInput:
      type: object
      required: [workOrderId]
      properties:
        workOrderId: { type: string, minLength: 1 }
        dueInDays: { type: integer, minimum: 0 }
        notes: { type: string }

    Payment:
      type: object
      required: [id, tenantId, invoiceId, customerId, date, amount, method, type, recordedByName]
      properties:
        id: { type: string }
        tenantId: { type: string }
        invoiceId: { type: string }
        customerId: { type: string }
        date: { type: string, format: date }
        amount: { type: number }
        method: { type: string }
        type: { type: string }
        recordedByUserId: { type: ["string", "null"] }
        recordedByName: { type: string }
        note: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    PaymentRecordInput:
      type: object
      required: [invoiceId, amount]
      properties:
        invoiceId: { type: string, minLength: 1 }
        amount: { type: number }
        method: { type: string }
        type:
          type: string
          enum: [Payment, Partial Payment, Credit, Refund]
        date: { type: string, format: date }
        note: { type: string }

    ServiceContract:
      type: object
      required: [id, tenantId, customerId, name, startDate, renewalDate, status, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        customerId: { type: string }
        locationId: { type: ["string", "null"] }
        name: { type: string }
        description: { type: ["string", "null"] }
        laborRate: { type: ["number", "null"] }
        afterHoursRate: { type: ["number", "null"] }
        value: { type: ["number", "null"] }
        includedServices:
          type: array
          items: { type: string }
        coveredEquipmentIds:
          type: array
          items: { type: string }
        startDate: { type: string, format: date }
        renewalDate: { type: string, format: date }
        status: { type: string }
        notes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ServiceContractInput:
      type: object
      required: [customerId, name, startDate, renewalDate]
      properties:
        customerId: { type: string, minLength: 1 }
        locationId: { type: string }
        name: { type: string, minLength: 1 }
        description: { type: string }
        laborRate: { type: number }
        afterHoursRate: { type: number }
        value: { type: number }
        includedServices:
          type: array
          items: { type: string }
        coveredEquipmentIds:
          type: array
          items: { type: string }
        startDate: { type: string, format: date }
        renewalDate: { type: string, format: date }

    ServiceContractUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        laborRate: { type: number }
        afterHoursRate: { type: number }
        value: { type: number }
        includedServices:
          type: array
          items: { type: string }
        coveredEquipmentIds:
          type: array
          items: { type: string }
        renewalDate: { type: string, format: date }
        status:
          type: string
          enum: [Active, Paused, Ended, Expired]
        notes: { type: string }

    ContractRenewInput:
      type: object
      properties:
        renewalDate: { type: string, format: date }
        termMonths: { type: integer, minimum: 1 }

    ContractReminder:
      type: object
      required: [id, tenantId, contractId, customerId, type, dueDate, message, status, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        contractId: { type: string }
        customerId: { type: string }
        type: { type: string }
        dueDate: { type: string, format: date }
        message: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }

    RecurrenceSchedule:
      type: object
      required: [id, tenantId, customerId, locationId, title, frequency, interval, status, startDate, occurrencesGenerated, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        contractId: { type: ["string", "null"] }
        customerId: { type: string }
        locationId: { type: string }
        title: { type: string }
        description: { type: ["string", "null"] }
        workOrderType: { type: string }
        priority: { type: string }
        frequency: { type: string }
        interval: { type: integer }
        weekdays:
          type: array
          items: { type: integer }
        monthDays:
          type: array
          items: { type: integer }
        blackoutDates:
          type: array
          items: { type: string, format: date }
        timeWindow: { type: ["string", "null"] }
        assignedTechnicianId: { type: ["string", "null"] }
        startDate: { type: string, format: date }
        endDate: { type: ["string", "null"], format: date }
        occurrenceLimit: { type: ["integer", "null"] }
        occurrencesGenerated: { type: integer }
        lastGeneratedDate: { type: ["string", "null"], format: date }
