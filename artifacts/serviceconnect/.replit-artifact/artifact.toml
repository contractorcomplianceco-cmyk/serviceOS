kind = "web"
previewPath = "/"
title = "ServiceConnect with RoseOS Intelligence"
version = "1.0.0"
id = "artifacts/serviceconnect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24052

[services.development]
run = "pnpm --filter @workspace/serviceconnect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/serviceconnect", "run", "build" ]
publicDir = "artifacts/serviceconnect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24052"
BASE_PATH = "/"
